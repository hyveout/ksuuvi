<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>KSUUVI — Avatar Creator</title>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: Arial, Helvetica, sans-serif;
    color: #111;
    background:
      radial-gradient(ellipse at 50% 0%, rgba(0,0,0,0) 0%, rgba(0,0,0,0.55) 100%),
      url("assets/brick-wall.jpg");
    background-size: 100% 100%, 560px auto;
    background-repeat: no-repeat, repeat;
    background-position: top, top left;
    background-attachment: fixed, scroll;
    background-color: #6a3220;
    min-height: 100vh;
    padding: 14px 0 44px;
    image-rendering: -webkit-optimize-contrast;
  }
  a { color: inherit; text-decoration: none; }

  /* Storefront sign — same compact treatment as homepage */
  .topbar-wrap {
    margin: 0 auto 12px;
    position: relative;
    z-index: 5;
    width: max-content;
    max-width: 96vw;
    filter: drop-shadow(0 6px 0 rgba(0,0,0,0.55)) drop-shadow(0 14px 22px rgba(0,0,0,0.5));
  }
  .topbar-wrap img.sign-bg {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    pointer-events: none;
  }
  .topbar {
    position: relative; z-index: 1;
    padding: 14px 28px;
    display: flex; align-items: center; justify-content: center; gap: 14px;
  }
  .topbar .brand { flex-shrink: 0; line-height: 0; transform: rotate(-1.5deg); filter: drop-shadow(0 3px 0 rgba(0,0,0,0.35)); }
  .topbar .brand img { display: block; height: 80px; width: auto; }
  /* Wrap around the kssuvi face — same wobble + hover as homepage */
  .topbar .avatar-star {
    line-height: 0; flex-shrink: 0;
    position: relative;
    display: inline-block;
    transform: rotate(6deg);
    transition: transform 0.15s ease, filter 0.15s ease;
    cursor: pointer;
    filter: drop-shadow(2px 4px 0 rgba(0,0,0,0.45)) drop-shadow(0 6px 10px rgba(0,0,0,0.4));
    animation: starwobble 3s ease-in-out infinite;
  }
  .topbar .avatar-star:hover {
    transform: rotate(0deg) scale(1.1);
    filter: drop-shadow(2px 5px 0 rgba(0,0,0,0.5)) drop-shadow(0 8px 14px rgba(0,0,0,0.5)) brightness(1.05);
    animation: none;
  }
  .topbar .avatar-star:active { transform: rotate(0deg) scale(1.04); }
  @keyframes starwobble {
    0%, 100% { transform: rotate(6deg); }
    50% { transform: rotate(10deg) translateY(-3px); }
  }
  .topbar .avatar-star img.face { display: block; height: 92px; width: auto; }
  /* The GO BACK! bubble — modeled after the "Avatar Creator!" bubble baked into the PNG */
  .goback-bubble {
    position: absolute;
    top: -10px;
    right: -22px;
    background: linear-gradient(180deg, #ffe066 0%, #ffb820 60%, #c97604 100%);
    border: 2px solid #1a0a04;
    color: #1a0a04;
    font-family: "Comic Sans MS", "Marker Felt", Impact, "Arial Black", sans-serif;
    font-weight: 900;
    font-size: 11px;
    letter-spacing: 0.02em;
    padding: 4px 9px 4px;
    border-radius: 14px;
    box-shadow:
      0 2px 0 #1a0a04,
      0 4px 8px rgba(0,0,0,0.45),
      inset 0 2px 0 rgba(255,255,255,0.55);
    white-space: nowrap;
    transform: rotate(-6deg);
    pointer-events: none;
    z-index: 2;
  }
  /* no tail — matches the homepage Avatar Creator bubble */
  @media (min-width: 520px) {
    .topbar .brand img { height: 110px; }
    .topbar .avatar-star img.face { height: 130px; }
    .topbar { gap: 22px; padding: 18px 36px; }
    .goback-bubble { font-size: 17px; padding: 7px 14px 8px; top: -14px; right: -30px; border-radius: 22px; }
    .goback-bubble::after { left: 18px; bottom: -10px; border-left-width: 8px; border-right-width: 10px; border-top-width: 12px; }
    .goback-bubble::before { left: 19px; bottom: -7px; border-left-width: 6px; border-right-width: 8px; border-top-width: 10px; }
  }

  /* Storefront wrap */
  .storefront {
    max-width: 760px; margin: 0 auto; position: relative;
  }

  /* Spine (corrugated shutter) */
  .spine {
    position: relative;
    margin: 0 auto;
    width: min(720px, 96vw);
    background:
      radial-gradient(ellipse at 12% 8%, rgba(0,0,0,0.22) 0%, transparent 30%),
      radial-gradient(ellipse at 88% 18%, rgba(0,0,0,0.18) 0%, transparent 35%),
      radial-gradient(ellipse at 30% 70%, rgba(0,0,0,0.15) 0%, transparent 40%),
      radial-gradient(ellipse at 75% 85%, rgba(0,0,0,0.20) 0%, transparent 35%),
      repeating-linear-gradient(180deg,
        #4a4a4a 0px, #c0c0c0 1px, #d8d8d8 3px, #9c9c9c 5px, #383838 6px, #4a4a4a 7px),
      linear-gradient(90deg, #4a4a4a 0%, #787878 8%, #a4a4a4 30%, #b4b4b4 50%, #a4a4a4 70%, #787878 92%, #4a4a4a 100%);
    background-blend-mode: multiply, multiply, multiply, multiply, normal, normal;
    border-left: 14px solid #1d2a26;
    border-right: 14px solid #1d2a26;
    box-shadow:
      0 0 0 3px #0a110f,
      inset 14px 0 22px -10px rgba(0,0,0,0.6),
      inset -14px 0 22px -10px rgba(0,0,0,0.6),
      0 18px 36px rgba(0,0,0,0.65);
  }

  /* Pelmet box */
  .pelmet-box {
    position: relative;
    z-index: 5;
    width: calc(min(720px, 96vw) + 22px);
    margin: 0 auto -8px;
    filter: drop-shadow(0 12px 16px rgba(0,0,0,0.55));
  }
  .pelmet-top {
    height: 14px;
    background: linear-gradient(180deg, #4a3018 0%, #6e4a26 40%, #5a3a1c 70%, #2a1808 100%);
    border-top: 2px solid #1a0a04;
    border-left: 2px solid #1a0a04;
    border-right: 2px solid #1a0a04;
    border-radius: 6px 6px 0 0;
    box-shadow: inset 0 2px 0 rgba(255,200,140,0.18), inset 0 -3px 6px rgba(0,0,0,0.5);
    position: relative;
  }
  .pelmet-top::after {
    content: ""; position: absolute; left: 0; right: 0; bottom: -3px;
    height: 3px; background: linear-gradient(180deg, #0a0604, #1a0a04);
    box-shadow: 0 1px 0 rgba(0,0,0,0.6);
  }
  .pelmet-face {
    position: relative;
    background:
      radial-gradient(ellipse at 50% 50%, transparent 35%, rgba(0,0,0,0.45) 100%),
      url("assets/rust-texture.jpg");
    background-size: 100% 100%, cover;
    background-position: center, center;
    background-repeat: no-repeat, no-repeat;
    background-blend-mode: multiply, normal;
    border-left: 3px solid #1a0a04;
    border-right: 3px solid #1a0a04;
    padding: 14px 16px 16px;
    box-shadow:
      inset 0 2px 0 rgba(255,210,160,0.25),
      inset 0 -4px 10px rgba(0,0,0,0.55),
      inset 3px 0 8px rgba(0,0,0,0.4),
      inset -3px 0 8px rgba(0,0,0,0.4);
    text-align: center;
  }
  .pelmet-face::before {
    content: "";
    position: absolute; inset: 0;
    background: repeating-linear-gradient(180deg,
      rgba(0,0,0,0) 0px, rgba(0,0,0,0.08) 3px,
      rgba(0,0,0,0) 7px, rgba(255,255,255,0.03) 14px, rgba(0,0,0,0) 22px);
    pointer-events: none;
    mix-blend-mode: overlay;
  }
  .pelmet-bottom {
    height: 16px;
    background: linear-gradient(180deg, #2a1808 0%, #1a0a04 50%, #0a0402 100%);
    border-bottom: 2px solid #050201;
    border-left: 2px solid #1a0a04;
    border-right: 2px solid #1a0a04;
    border-radius: 0 0 4px 4px;
    box-shadow:
      inset 0 2px 4px rgba(0,0,0,0.7),
      inset 0 -1px 0 rgba(80,40,18,0.3),
      0 4px 8px rgba(0,0,0,0.5);
  }

  .back-btn {
    appearance: none;
    background: linear-gradient(180deg, #fff8e0, #d6c8a0);
    border: 2px solid #1a0a04;
    color: #2a0a04;
    font-family: Impact, "Arial Black", sans-serif;
    font-size: 14px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 8px 18px;
    border-radius: 4px;
    box-shadow: 0 3px 0 #1a0a04, inset 0 2px 0 rgba(255,255,255,0.6);
    cursor: pointer;
    z-index: 2;
    position: relative;
  }
  .back-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #1a0a04, inset 0 2px 0 rgba(255,255,255,0.6); }

  /* Coming-soon panel inside shutter */
  .coming {
    padding: 60px 24px 80px;
    text-align: center;
    color: #fff;
    position: relative;
  }
  .coming .big {
    display: inline-block;
    font-family: Impact, "Arial Black", sans-serif;
    font-size: clamp(40px, 12vw, 88px);
    line-height: 0.95;
    letter-spacing: 0.04em;
    color: #fff8e0;
    text-shadow:
      4px 4px 0 #2a0a04,
      -2px -2px 0 #5a1a08,
      0 8px 18px rgba(0,0,0,0.7);
    background: linear-gradient(180deg, #fff8e0 0%, #f5d089 55%, #c68a2a 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(3px 3px 0 #2a0a04);
    padding: 8px 16px;
    transform: rotate(-1deg);
  }
  .coming .sub {
    margin-top: 18px;
    font-family: Impact, "Arial Black", sans-serif;
    font-size: 18px;
    letter-spacing: 0.16em;
    color: #fff8e0;
    text-shadow: 2px 2px 0 #2a0a04, 0 4px 10px rgba(0,0,0,0.6);
    text-transform: uppercase;
  }
  .coming .blurb {
    margin: 22px auto 0;
    max-width: 420px;
    font-size: 14px;
    line-height: 1.55;
    color: #efe6d0;
    text-shadow: 1px 1px 0 rgba(0,0,0,0.6);
  }
  .coming .blink {
    display: inline-block;
    color: #ff5a3a;
    animation: blink 1s steps(2) infinite;
    text-shadow: 0 0 8px rgba(255,90,58,0.6), 2px 2px 0 #2a0a04;
  }
  @keyframes blink { 50% { opacity: 0; } }
  .coming .back-row { margin-top: 36px; }
</style>
</head>
<body>

<!-- Storefront sign -->
<div class="topbar-wrap">
  <img class="sign-bg" src="assets/storefront-sign-v2.png" alt="">
  <div class="topbar">
    <a class="brand" href="index.html">
      <img src="assets/uptown-baby-v2-cropped.png" alt="UPTOWN BABY">
    </a>
    <a class="avatar-star" href="index.html" aria-label="Go back">
      <img class="face" src="assets/avatar-button.png" alt="Go back">
      <span class="goback-bubble">Go Back!</span>
    </a>
  </div>
</div>

<div class="storefront">

  <!-- Pelmet box -->
  <div class="pelmet-box">
    <div class="pelmet-top"></div>
    <div class="pelmet-face">

    </div>
    <div class="pelmet-bottom"></div>
  </div>

  <div class="spine">
    <div class="coming">
      <div class="big">AVATAR<br>CREATOR</div>
      <div class="sub"><span class="blink">★</span> &nbsp; COMING SOON &nbsp; <span class="blink">★</span></div>
    </div>
  </div>
</div>

</body>
</html>
