<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.6"/>
    </filter>
  </defs>
  <!-- dark shadow line just inside the outline for depth -->
  <path fill="none" stroke="rgba(0,0,0,0.55)" stroke-width="4" stroke-linejoin="round" stroke-linecap="round" filter="url(#softShadow)" d="
    M 20 20
    L 40 20
    C 40 10, 60 10, 60 20
    L 80 20
    L 80 40
    C 90 40, 90 60, 80 60
    L 80 80
    L 60 80
    C 60 70, 40 70, 40 80
    L 20 80
    L 20 60
    C 30 60, 30 40, 20 40
    Z
  "/>
  <!-- bright white outline -->
  <path fill="none" stroke="#ffffff" stroke-width="2.6" stroke-linejoin="round" stroke-linecap="round" d="
    M 20 20
    L 40 20
    C 40 10, 60 10, 60 20
    L 80 20
    L 80 40
    C 90 40, 90 60, 80 60
    L 80 80
    L 60 80
    C 60 70, 40 70, 40 80
    L 20 80
    L 20 60
    C 30 60, 30 40, 20 40
    Z
  "/>
</svg>
