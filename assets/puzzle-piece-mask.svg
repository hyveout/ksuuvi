<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Classic jigsaw piece: square with knobs on top+right, blank on left+bottom -->
  <path fill="#000" d="
    M 20 20
    L 40 20
    C 40 10, 60 10, 60 20
    L 80 20
    L 80 40
    C 90 40, 90 60, 80 60
    L 80 80
    L 60 80
    C 60 70, 40 70, 40 80
    L 20 80
    L 20 60
    C 30 60, 30 40, 20 40
    Z
  "/>
</svg>
